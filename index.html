<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechWorld</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/assets/icon.png">
</head>


<body>
    <div class="header" id="topHeader">
        <h2>TechWorld </h2>


        <nav class="navbar">
            <a href="#" class="nav-logo"><img src="assets/logo.png" alt="TechWorld Logo" class="nav-logo-img">
            </a>
            <ul class="category-menu">
                <li><a href="#" data-category=laptops>Laptops</a></li>
                <li><a href="#" data-category=keyboards>Keyboards</a></li>
                <li><a href="#" data-category=headsets>Headsets</a></li>
            </ul>
        </nav>
    </div>

    <div class="container">
        <div class="category-info">
            <h1 id="categoryTitle"></h1>
            <p id="categoryDesc"></p>
        </div>

        <div class="sort-container">
            <label for="sortSelect">Sort by:</label>
            <select id="sortSelect">
                <option value="Alphabetical (A-Z)">Alphabetical (A–Z)</option>
                <option value="Alphabetical (Z-A)">Alphabetical (Z–A)</option>
                <option value="Price (Low to High)">Price (Low to High)</option>
                <option value="Price (High to Low)">Price (High to Low)</option>
            </select>
        </div>

        <div class="products-layout">
            <main id="main"></main>
            <div id="productCount" class="product-count"></div>
        </div>

        <button id="loadMore" class="load-more-btn">Load More</button>
    </div>




    <footer class="footer">
        <p>Copyright &copy; 2026 TechWorld. All rights reserved.</p>
        <ul class="footer-links">
            <li><a href="#">Terms & Conditions</a></li>
            <li><a href="#">Privacy Policy</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>
    </footer>

    <script src="sortfilter.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>

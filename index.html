<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechWorld</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="/assets/icon.png">
</head>

<body class="min-vh-100 d-flex flex-column">

    <nav class="navbar navbar-expand-lg navbar-dark sticky-top site-navbar">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2 fw-semibold" href="#">
                <img src="assets/logo.png" alt="TechWorld Logo" class="nav-logo-img">
                <span>TechWorld</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#" data-category="laptops">Laptops</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" data-category="keyboards">Keyboards</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" data-category="headsets">Headsets</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1">
        <div class="container py-4">

            <div class="category-info">
                <h1 id="categoryTitle"></h1>
                <p id="categoryDesc"></p>
            </div>

            <div class="row g-4">
                <aside class="col-12 col-lg-3">
                    <div class="filters">
                        <h2 class="h6 mb-2">Brand</h2>
                        <div class="brand-checkboxes mb-3"></div>

                        <h2 class="h6 mb-2">Price</h2>

                        <div class="mb-3">
                            <label for="minPrice">Min Price: $</label>
                            <input class="form-control form-control-sm w-50" type="number" id="minPrice" name="minPrice"
                                min="0" max="1000" step="10">
                        </div>

                        <div class="mb-3">
                            <label for="maxPrice">Max Price: $</label>
                            <input class="form-control form-control-sm w-50" type="number" id="maxPrice" name="maxPrice"
                                min="0" max="1000" step="10">
                        </div>

                        <h3 class="h6 mb-2">Minimum Rating</h3>
                        <select class="form-select form-select-sm w-50" id="minRating" name="minRating">
                            <option value="3">3 stars</option>
                            <option value="4">4 stars</option>
                            <option value="5">5 stars</option>
                        </select>
                    </div>
                </aside>

                <!-- products container (sort, filter,product card grid, load more)  ! -->
                <section class="col-12 col-lg-9">
                    <div class="d-flex justify-content-end align-items-center gap-2 mb-3">
                        <label for="sortSelect" class="form-label mb-0">Sort by:</label>
                        <select id="sortSelect" class="form-select" style="max-width: 260px;">
                            <option value="Alphabetical (A-Z)">Alphabetical (A–Z)</option>
                            <option value="Alphabetical (Z-A)">Alphabetical (Z–A)</option>
                            <option value="Price (Low to High)">Price (Low to High)</option>
                            <option value="Price (High to Low)">Price (High to Low)</option>
                        </select>
                    </div>

                    <div class="text-center fw-semibold mb-3">
                        <div id="productCount" class="product-count"></div>
                    </div>

                    <!-- product cards !-->
                    <div id="main" class="row g-3"></div>

                    <div class="d-flex justify-content-center my-4">
                        <button id="loadMore" class="btn btn-primary btn-brand" type="button">
                            Load More
                        </button>
                    </div>
                </section>
            </div>

            <!-- Toast alert for add to cart -->
            <div class="toast-container position-fixed bottom-0 end-0 p-3">
                <div id="cartToast" class="toast align-items-center text-bg-success border-0" role="alert"
                    aria-live="assertive" aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body" id="cartToastBody">
                            Added to cart!
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                            aria-label="Close"></button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="footer mt-auto">
        <p>Copyright &copy; 2026 TechWorld. All rights reserved.</p>
        <ul class="footer-links">
            <li><a href="#">Terms & Conditions</a></li>
            <li><a href="#">Privacy Policy</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sortfilter.js"></script>
    <script src="data.js"></script>
    <script src="script.js"></script>
</body>

</html>
